<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Imposter Who?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14; --s1: #16161f; --s2: #1f1f2e;
      --accent: #7c5cfc; --red: #ff4b4b; --green: #22c55e;
      --text: #f0eeff; --muted: #7b7a99; --r: 14px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100svh; display: flex; justify-content: center;
    }
    #root {
      width: 100%; max-width: 430px; min-height: 100svh;
      display: flex; flex-direction: column; padding: 0 20px;
    }
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.show { display: flex; }

    /* ── waiting ─── */
    .center-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; text-align: center;
    }
    .center-state .emoji { font-size: 64px; line-height: 1.1; }
    .center-state h2 { font-size: 22px; font-weight: 800; }
    .center-state p  { color: var(--muted); font-size: 14px; line-height: 1.6; max-width: 240px; }

    /* ── name grid ── */
    .page-hdr { padding: 48px 0 20px; }
    .page-hdr h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .page-hdr p  { font-size: 14px; color: var(--muted); margin-top: 5px; }

    .name-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    }
    .name-btn {
      background: var(--s1); border: 2px solid transparent;
      border-radius: var(--r); padding: 22px 10px;
      color: var(--text); font-size: 17px; font-weight: 700;
      cursor: pointer; font-family: inherit; position: relative;
      transition: border-color 0.15s, transform 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .name-btn:hover  { border-color: var(--accent); }
    .name-btn:active { transform: scale(0.95); background: var(--s2); }
    .crown-flag { position: absolute; top: 6px; right: 8px; font-size: 13px; opacity: 0.7; }

    .round-badge { text-align: center; margin: 20px 0 12px; }
    .round-badge span {
      display: inline-block; background: var(--s1); color: var(--muted);
      font-size: 13px; font-weight: 600; padding: 6px 18px;
      border-radius: 30px; letter-spacing: 0.5px;
    }
    .new-game-link {
      text-align: center; padding-bottom: 28px;
    }
    .new-game-link button {
      background: none; border: none; color: var(--muted); font-size: 13px;
      cursor: pointer; font-family: inherit;
      text-decoration: underline; text-underline-offset: 3px;
    }

    /* ── reveal ─── */
    .back-btn {
      background: none; border: none; color: var(--muted); font-size: 15px;
      cursor: pointer; font-family: inherit;
      padding: 16px 0 4px; display: flex; align-items: center; gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .reveal-player-name {
      text-align: center; margin-top: 8px; margin-bottom: 4px;
      font-size: 18px; font-weight: 800; letter-spacing: 0.5px;
      color: var(--text); text-transform: uppercase;
    }
    .reveal-round {
      text-align: center; margin-bottom: 28px;
    }
    .reveal-round span {
      background: var(--s2); color: var(--muted);
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      padding: 5px 14px; border-radius: 20px;
    }

    .reveal-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
    }
    .reveal-bar {
      width: 80px; height: 4px; border-radius: 2px;
      background: var(--accent); margin-bottom: 28px;
      transition: background 0.3s;
    }
    .reveal-bar.red { background: var(--red); }
    .reveal-role {
      font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    .reveal-word {
      font-size: 52px; font-weight: 900; letter-spacing: -1.5px; line-height: 1.05;
      margin-bottom: 20px;
    }
    .reveal-word.red { color: var(--red); }

    .refresh-btn {
      background: var(--s2); border: none; color: var(--muted);
      font-size: 13px; font-weight: 600; padding: 8px 20px;
      border-radius: 20px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 6px;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, background 0.15s;
    }
    .refresh-btn:active { background: var(--s1); color: var(--text); }

    .reveal-footer {
      padding-bottom: 32px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .btn-next {
      width: 100%; padding: 16px; border-radius: var(--r); border: none;
      font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
      background: var(--accent); color: #fff;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next:active { transform: scale(0.97); opacity: 0.88; }
    .new-game-small {
      background: none; border: none; color: var(--muted); font-size: 13px;
      cursor: pointer; font-family: inherit;
      text-decoration: underline; text-underline-offset: 3px;
    }

    /* ── toast ─── */
    .toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      padding: 10px 20px; border-radius: 30px;
      font-size: 14px; font-weight: 700; color: #fff;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 50; white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="root">

  <!-- WAITING -->
  <div id="s-waiting" class="screen">
    <div class="center-state">
      <div class="emoji">🕵️</div>
      <h2>Waiting for admin</h2>
      <p>The admin hasn't started the game yet. Hang tight!</p>
    </div>
  </div>

  <!-- NAME GRID -->
  <div id="s-names" class="screen">
    <div class="page-hdr">
      <h1>🕵️ Imposter Who?</h1>
      <p>Tap your name to see your role</p>
    </div>
    <div id="name-grid" class="name-grid"></div>
    <div class="round-badge"><span id="round-label">Round 1</span></div>
    <div style="flex:1"></div>
    <div class="new-game-link">
      <button onclick="confirmNewGame()">↺ Start a new game</button>
    </div>
  </div>

  <!-- REVEAL -->
  <div id="s-reveal" class="screen">
    <button class="back-btn" onclick="goBack()">‹ Back</button>

    <div class="reveal-player-name" id="r-player-name"></div>
    <div class="reveal-round"><span id="r-round">Round 1</span></div>

    <div class="reveal-wrap">
      <div class="reveal-bar" id="r-bar"></div>
      <div class="reveal-role" id="r-role"></div>
      <div class="reveal-word" id="r-word"></div>
      <button class="refresh-btn" onclick="refreshReveal()">↺ Refresh</button>
    </div>

    <div class="reveal-footer">
      <button class="btn-next" id="reveal-next-btn"
              onclick="nextRound()" style="display:none">
        ▶ Next Round
      </button>
      <button class="new-game-small" id="reveal-newgame-btn"
              onclick="confirmNewGame()" style="display:none">
        ↺ start a new game
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDEKyWhI-75_IkPX3p1nWaFKtQQUbNHZS4",
  authDomain: "impostergame-8b419.firebaseapp.com",
  databaseURL: "https://impostergame-8b419-default-rtdb.firebaseio.com",
  projectId: "impostergame-8b419",
  storageBucket: "impostergame-8b419.firebasestorage.app",
  messagingSenderId: "508611034053",
  appId: "1:508611034053:web:f5952bd908782f0b55e9ac"
};
firebase.initializeApp(firebaseConfig);
const db  = firebase.database();
const ref = db.ref('imposter/game');

let gameState     = null;
let myName        = null;
let lastUpdatedAt = null;

/* ── helpers ──────────────────── */
function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  return Object.values(v);
}
function pickWord(words, prev) {
  const pool = words.length > 1 ? words.filter(w => w !== prev) : words;
  return pool[Math.floor(Math.random() * pool.length)];
}
function pickImposter(players, prev) {
  const pool = players.length > 2 ? players.filter(p => p !== prev) : players;
  return pool[Math.floor(Math.random() * pool.length)];
}

/* ── screen ───────────────────── */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  document.getElementById(id).classList.add('show');
}
function currentScreen() {
  return document.querySelector('.screen.show')?.id ?? '';
}

/* ── Firebase listener ─────────── */
ref.on('value', snap => {
  const g = snap.val();
  gameState = g;

  if (!g || g.status !== 'active' || !toArr(g.players).length) {
    if (!['s-reveal'].includes(currentScreen())) show('s-waiting');
    if (!currentScreen()) show('s-waiting');
    return;
  }

  const round = g.round ?? 1;
  buildNameGrid(toArr(g.players), g.adminPlayerName);
  document.getElementById('round-label').textContent = `Round ${round}`;
  document.getElementById('r-round').textContent     = `Round ${round}`;

  if (myName && currentScreen() === 's-reveal') {
    if (lastUpdatedAt && g.updatedAt !== lastUpdatedAt) {
      showToast('🔄 New round!', 'var(--accent)');
    }
    renderReveal(g, myName);
  }

  if (!currentScreen() || currentScreen() === 's-waiting') show('s-names');

  lastUpdatedAt = g.updatedAt;
});

/* ── name grid ────────────────── */
function buildNameGrid(names, adminPlayerName) {
  document.getElementById('name-grid').innerHTML = names.map(n => {
    const isAdmin  = n === adminPlayerName;
    const safeAttr = n.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    const safeText = n.replace(/&/g, '&amp;').replace(/</g, '&lt;');
    return `<button class="name-btn" data-name="${safeAttr}" onclick="handleNameTap(this)">
      ${isAdmin ? '<span class="crown-flag">👑</span>' : ''}
      ${safeText}
    </button>`;
  }).join('');
}

function handleNameTap(btn) { pickName(btn.getAttribute('data-name')); }

function pickName(name) {
  if (!gameState) { showToast('Still connecting…', 'var(--s2)'); return; }
  myName = name;
  renderReveal(gameState, name);
  show('s-reveal');
}

/* ── reveal ───────────────────── */
function renderReveal(g, name) {
  const isImposter    = g.imposterName === name;
  const isAdminPlayer = g.adminPlayerName === name;
  const round         = g.round ?? 1;

  document.getElementById('r-player-name').textContent = name;
  document.getElementById('r-round').textContent       = `Round ${round}`;
  document.getElementById('r-bar').className           = 'reveal-bar' + (isImposter ? ' red' : '');
  document.getElementById('r-role').textContent        = isImposter ? '⚠️  You are the' : 'The secret word is';
  document.getElementById('r-word').textContent        = isImposter ? 'IMPOSTER' : g.currentWord;
  document.getElementById('r-word').className          = 'reveal-word' + (isImposter ? ' red' : '');

  const d = isAdminPlayer ? 'block' : 'none';
  document.getElementById('reveal-next-btn').style.display    = d;
  document.getElementById('reveal-newgame-btn').style.display = d;
}

function refreshReveal() {
  ref.once('value', s => {
    const g = s.val();
    if (!g || !myName) return;
    gameState = g;
    renderReveal(g, myName);
    showToast('↺ Refreshed', 'var(--s2)');
  });
}

function goBack() { myName = null; show('s-names'); }

/* ── next round ───────────────── */
function nextRound() {
  if (!gameState) return;
  const words   = toArr(gameState.wordList);
  const players = toArr(gameState.players);
  if (!words.length || !players.length) { showToast('⚠️ Missing data', 'var(--red)'); return; }

  const word     = pickWord(words, gameState.currentWord);
  const imposter = pickImposter(players, gameState.imposterName);
  const newRound = (gameState.round ?? 1) + 1;
  const now      = Date.now();

  // Optimistic local update
  gameState = { ...gameState, currentWord: word, imposterName: imposter, round: newRound, updatedAt: now };
  renderReveal(gameState, myName);
  document.getElementById('r-round').textContent    = `Round ${newRound}`;
  document.getElementById('round-label').textContent = `Round ${newRound}`;

  ref.update({ currentWord: word, imposterName: imposter, round: newRound, updatedAt: now });
}

/* ── new game ─────────────────── */
function confirmNewGame() {
  if (!confirm('Start a new game? This clears the current game for everyone.')) return;
  ref.remove();
  myName = null;
  show('s-waiting');
}

/* ── toast ────────────────────── */
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color || 'var(--accent)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
