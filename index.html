<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Imposter Who? — Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14; --s1: #16161f; --s2: #1f1f2e;
      --accent: #7c5cfc; --red: #ff4b4b; --green: #22c55e;
      --gold: #f59e0b; --text: #f0eeff; --muted: #7b7a99; --r: 14px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100svh; display: flex; justify-content: center;
    }
    #root {
      width: 100%; max-width: 430px; min-height: 100svh;
      display: flex; flex-direction: column; padding: 0 20px;
    }
    .page-hdr { padding: 48px 0 20px; }
    .page-hdr h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .page-hdr p  { font-size: 14px; color: var(--muted); margin-top: 5px; }
    .card { background: var(--s1); border-radius: 20px; padding: 20px; margin-bottom: 14px; }
    .sec-lbl {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }
    .row { display: flex; gap: 8px; }
    input, textarea {
      background: var(--s2); border: 2px solid transparent;
      border-radius: var(--r); padding: 14px 16px;
      color: var(--text); font-size: 15px; font-family: inherit;
      width: 100%; outline: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    ::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 130px; line-height: 1.65; }
    .add-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--r); padding: 0 18px; font-size: 24px;
      cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; min-height: 28px; }
    .tag {
      background: var(--s2); border-radius: 30px;
      padding: 6px 8px 6px 14px; font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 4px; transition: background 0.15s;
    }
    .tag.is-admin { background: rgba(245,158,11,0.15); border: 1.5px solid var(--gold); }
    .crown-btn {
      background: none; border: none; cursor: pointer; font-size: 15px;
      padding: 0 3px; line-height: 1; opacity: 0.3; transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tag.is-admin .crown-btn { opacity: 1; }
    .tag-x { color: var(--muted); cursor: pointer; font-size: 19px; line-height: 1; padding: 0 2px; }
    .tag-x:hover { color: var(--red); }
    .admin-hint { font-size: 12px; color: var(--muted); margin-top: 10px; display: flex; align-items: center; gap: 5px; }
    .btn {
      width: 100%; padding: 16px; border-radius: var(--r); border: none;
      font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s, transform 0.1s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); opacity: 0.88; }
    .btn-accent { background: var(--accent); color: #fff; }
    .actions { display: flex; flex-direction: column; gap: 10px; padding-bottom: 36px; }
    .toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      padding: 10px 20px; border-radius: 30px;
      font-size: 14px; font-weight: 700; color: #fff;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 50; white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .success-box {
      background: rgba(34,197,94,0.12); border: 1.5px solid var(--green);
      border-radius: 16px; padding: 16px 20px; margin-bottom: 14px;
      display: none;
    }
    .success-box p { font-size: 14px; color: var(--green); font-weight: 600; margin-bottom: 8px; }
    .success-box a {
      font-size: 13px; color: var(--muted); text-underline-offset: 3px;
      text-decoration: underline; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="root">
  <div class="page-hdr">
    <h1>🕵️ Imposter Who?</h1>
    <p>Admin setup — add players and words, then start</p>
  </div>

  <div id="success-box" class="success-box">
    <p>✅ Game started! Link copied.</p>
    <a id="game-link-anchor" href="game.html" target="_blank">Open game.html to play →</a>
  </div>

  <div class="card">
    <div class="sec-lbl">Players</div>
    <div class="row">
      <input type="text" id="p-input" placeholder="Enter a name…"
             onkeydown="if(event.key==='Enter')addPlayer()">
      <button class="add-btn" onclick="addPlayer()">+</button>
    </div>
    <div class="tags" id="p-tags">
      <span style="color:var(--muted);font-size:13px">No players yet</span>
    </div>
    <div class="admin-hint">
      <span>👑</span><span>Tap crown to set who controls Next Round</span>
    </div>
  </div>

  <div class="card">
    <div class="sec-lbl">Word List — one word per line</div>
    <textarea id="w-list"
      placeholder="Pizza&#10;Football&#10;Guitar&#10;Tokyo&#10;Submarine&#10;Elephant&#10;…"></textarea>
  </div>

  <div style="flex:1"></div>
  <div class="actions">
    <button class="btn btn-accent" id="start-btn" onclick="copyAndStart()">
      🔗 Copy Game Link &amp; Start
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDEKyWhI-75_IkPX3p1nWaFKtQQUbNHZS4",
  authDomain: "impostergame-8b419.firebaseapp.com",
  databaseURL: "https://impostergame-8b419-default-rtdb.firebaseio.com",
  projectId: "impostergame-8b419",
  storageBucket: "impostergame-8b419.firebasestorage.app",
  messagingSenderId: "508611034053",
  appId: "1:508611034053:web:f5952bd908782f0b55e9ac"
};
firebase.initializeApp(firebaseConfig);
const db  = firebase.database();
const ref = db.ref('imposter/game');

let setupPlayers = [];
let setupAdminName = null;

function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  return Object.values(v);
}
function pickWord(words, prev) {
  const pool = words.length > 1 ? words.filter(w => w !== prev) : words;
  return pool[Math.floor(Math.random() * pool.length)];
}
function pickImposter(players, prev) {
  const pool = players.length > 2 ? players.filter(p => p !== prev) : players;
  return pool[Math.floor(Math.random() * pool.length)];
}

function addPlayer() {
  const inp = document.getElementById('p-input');
  const n   = inp.value.trim();
  if (!n || setupPlayers.includes(n)) { inp.value = ''; return; }
  setupPlayers.push(n);
  if (setupPlayers.length === 1) setupAdminName = n;
  inp.value = '';
  renderTags();
}
function removeByIdx(btn) {
  const i = parseInt(btn.getAttribute('data-i'));
  const n = setupPlayers[i];
  setupPlayers.splice(i, 1);
  if (setupAdminName === n) setupAdminName = setupPlayers[0] ?? null;
  renderTags();
}
function crownByIdx(btn) {
  const i = parseInt(btn.getAttribute('data-i'));
  setupAdminName = setupPlayers[i];
  renderTags();
}
function renderTags() {
  const el = document.getElementById('p-tags');
  if (!setupPlayers.length) {
    el.innerHTML = '<span style="color:var(--muted);font-size:13px">No players yet</span>';
    return;
  }
  el.innerHTML = setupPlayers.map((n, i) => {
    const isAdmin  = n === setupAdminName;
    const safeText = n.replace(/&/g, '&amp;').replace(/</g, '&lt;');
    return `<div class="tag ${isAdmin ? 'is-admin' : ''}">
      <button class="crown-btn" data-i="${i}" onclick="crownByIdx(this)">👑</button>
      ${safeText}
      <span class="tag-x" data-i="${i}" onclick="removeByIdx(this)">×</span>
    </div>`;
  }).join('');
}

function copyAndStart() {
  if (setupPlayers.length < 2) { showToast('⚠️ Add at least 2 players!', 'var(--red)'); return; }
  const raw   = document.getElementById('w-list').value.trim();
  const words = raw.split('\n').map(w => w.trim()).filter(Boolean);
  if (!words.length) { showToast('⚠️ Add at least one word!', 'var(--red)'); return; }

  const word     = pickWord(words, null);
  const imposter = pickImposter(setupPlayers, null);

  ref.set({
    status: 'active', players: setupPlayers, wordList: words,
    currentWord: word, imposterName: imposter,
    adminPlayerName: setupAdminName, round: 1, updatedAt: Date.now()
  });

  // Build game.html URL
  const gameUrl = window.location.href
    .replace(/\/index\.html.*$/, '')
    .replace(/\/$/, '') + '/game.html';

  navigator.clipboard.writeText(gameUrl).then(() => {
    const box = document.getElementById('success-box');
    box.style.display = 'block';
    document.getElementById('game-link-anchor').href = gameUrl;
    document.getElementById('start-btn').textContent = '✅ Link Copied!';
    document.getElementById('start-btn').style.background = 'var(--green)';
    setTimeout(() => {
      document.getElementById('start-btn').innerHTML = '🔗 Copy Game Link &amp; Start';
      document.getElementById('start-btn').style.background = '';
    }, 3000);
  }).catch(() => {
    prompt('Copy this link and share with friends:', gameUrl);
  });
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color || 'var(--accent)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
